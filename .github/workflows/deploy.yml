name: Deploy Frontend to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://inventory-erp-backend.onrender.com/api/v1

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          npm install -g netlify-cli@17 2>/dev/null

          # Find site ID
          SITE_ID=$(curl -s \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/sites" \
            | python3 -c "
          import sys, json
          try:
              sites = json.load(sys.stdin)
              for s in (sites if isinstance(sites,list) else []):
                  if 'bespoke-souffle' in s.get('name','') + s.get('default_domain',''):
                      print(s['id']); break
          except Exception as e:
              print('', end='')
          " 2>/dev/null || echo "")

          echo "Site ID: '$SITE_ID'"

          if [ -n "$SITE_ID" ]; then
            echo "Deploying to existing site $SITE_ID ..."
            netlify deploy \
              --prod \
              --dir=dist \
              --site="$SITE_ID" \
              --auth="$NETLIFY_AUTH_TOKEN" \
              --message="Fix: VITE_API_URL now points to Render backend"
          else
            echo "No existing site found — creating new..."
            netlify deploy \
              --prod \
              --dir=dist \
              --auth="$NETLIFY_AUTH_TOKEN" \
              --message="Initial deploy"
          fi

      - name: Update Netlify env var
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          SITE_ID=$(curl -s \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/sites" \
            | python3 -c "
          import sys, json
          try:
              sites = json.load(sys.stdin)
              for s in (sites if isinstance(sites,list) else []):
                  if 'bespoke-souffle' in s.get('name','') + s.get('default_domain',''):
                      print(s['id']); break
          except: pass
          " 2>/dev/null || echo "")

          if [ -n "$SITE_ID" ]; then
            curl -s -X PATCH \
              -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.netlify.com/api/v1/sites/$SITE_ID" \
              -d '{"build_settings":{"env":{"VITE_API_URL":"https://inventory-erp-backend.onrender.com/api/v1"}}}'
            echo "VITE_API_URL env var set on Netlify."
          else
            echo "Could not find site to update env var."
          fi
